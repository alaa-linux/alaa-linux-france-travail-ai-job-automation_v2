version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: job_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job_network

  n8n:
    image: n8nio/n8n:latest
    container_name: job_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - TZ=Europe/Paris
      - FRANCE_TRAVAIL_CLIENT_ID=${FRANCE_TRAVAIL_CLIENT_ID}
      - FRANCE_TRAVAIL_CLIENT_SECRET=${FRANCE_TRAVAIL_CLIENT_SECRET}
      - GMAIL_FROM=${GMAIL_FROM}
      - GMAIL_TO=${GMAIL_TO}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - job_network

volumes:
  postgres_data:
  n8n_data:

networks:
  job_network:
    driver: bridge
